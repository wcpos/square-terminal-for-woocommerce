name: Release

# Cuts a GitHub Release whenever the plugin header version changes on main.
# The build is scoped with PHP-Scoper and packaged with the same .distignore
# rules used for distribution, then attached as
# square-terminal-for-woocommerce.zip so the WCPOS extensions catalog can pick
# it up automatically.
#
# It can also be run manually from the Actions tab (workflow_dispatch), e.g. to
# re-cut a release after a failed run. Tick "force" to replace an existing
# release for the current header version.

on:
  push:
    branches:
      - main
    paths:
      - square-terminal-for-woocommerce.php
  workflow_dispatch:
    inputs:
      force:
        description: Replace the release if it already exists for the current version
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Read plugin version
        id: version
        run: |
          VERSION=$(grep -ioP '^\s*\*\s*Version:\s*\K[0-9][0-9A-Za-z.\-]*' square-terminal-for-woocommerce.php | head -n1)
          if [ -z "$VERSION" ]; then
            echo "Could not determine plugin version from header" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Plugin version: $VERSION"

      - name: Check whether release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh release view "v${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
          elif [ "${{ inputs.force }}" = "true" ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "Release v${{ steps.version.outputs.version }} exists; force re-release requested."
          else
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release v${{ steps.version.outputs.version }} already exists; skipping."
          fi

      - name: Set up PHP
        if: steps.check.outputs.exists == 'false'
        uses: shivammathur/setup-php@v2
        with:
          # Build with 8.2: PHP-Scoper requires ^8.2. Runtime deps are still
          # resolved for 8.1 via the composer "platform" config, and the
          # scoped output is PHP-version-agnostic, so the plugin's 8.1
          # minimum is unaffected.
          php-version: '8.2'
          tools: composer, wp-cli

      - name: Install runtime dependencies
        if: steps.check.outputs.exists == 'false'
        run: composer install --no-dev --prefer-dist --no-progress --optimize-autoloader

      - name: Build scoped vendor
        if: steps.check.outputs.exists == 'false'
        run: composer run-script build:scoped-vendor

      - name: Package distributable zip
        if: steps.check.outputs.exists == 'false'
        run: |
          wp package install wp-cli/dist-archive-command:@stable
          wp dist-archive . ./square-terminal-for-woocommerce.zip \
            --plugin-dirname=square-terminal-for-woocommerce
          if [ ! -s ./square-terminal-for-woocommerce.zip ]; then
            echo "Distributable zip was not created or is empty" >&2
            exit 1
          fi
          echo "Packaged $(du -h ./square-terminal-for-woocommerce.zip | cut -f1) archive"

      - name: Create GitHub Release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            gh release delete "v${{ steps.version.outputs.version }}" --yes --cleanup-tag || true
          fi
          gh release create "v${{ steps.version.outputs.version }}" \
            ./square-terminal-for-woocommerce.zip \
            --target "$GITHUB_SHA" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes
